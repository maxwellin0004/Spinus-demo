        - generic [ref=e134]:
          - heading "内容简介 · · · · · ·" [level=2] [ref=e135]
          - generic [ref=e138]:
            - paragraph [ref=e139]: 名家名作名译——悦经典系列 14
            - paragraph [ref=e140]: .
            - paragraph [ref=e141]: 剖析不朽人性，结构独特灵魂。
            - paragraph [ref=e142]: 20世纪拥有最多读者的作家之一，英文现实主义巨擘，故事圣手毛姆代表性长篇名作。
            - paragraph [ref=e143]: .
            - paragraph [ref=e144]: 一位四十岁才学习绘画的证券经纪人，放弃优裕的生活，疯狂迷恋上了绘画。为了追求艺术理想，他饱尝贫穷与饥饿的煎熬，忍受精神上的痛苦折磨，最终遁迹与世隔绝 的塔西提岛，成为一个自成一格的画家。《月亮与六便士》的主人公一生活动的轨迹仿佛就是在解构小说原型高更的画作主题：我们从何处 来？我们是谁？我们向何处去？
            - paragraph [ref=e145]: 毛姆用幽默的文字、动人的情节、深刻的思想编织了一位艺术家的传奇人生，探索了艺术与生活的矛盾与相互作用。这部堪称完美的小说成为了经典中的经典，让一代又一代读者将之奉为必读佳作。
            - paragraph [ref=e146]: ……………………
            - paragraph [ref=e147]: 读《月亮与六便士》就像一头撞在了高耸的冰山上，令平庸的日常生活彻底解体！
            - paragraph [ref=e148]: ——弗吉尼亚•伍尔夫
