          - generic [ref=e168]:
            - paragraph [ref=e169]: 作者：
            - paragraph [ref=e170]: 威廉•萨默赛特•毛姆
            - paragraph [ref=e171]: 英国作家、小说家、剧作家，20世纪拥有最多读者的作家之一。
            - paragraph [ref=e172]: 1874年出生在巴黎，先在坎特伯雷国王学校学习，后进入海德堡大学攻读哲学，最后进圣托马斯医学院学医。1897年医科毕业后成为医生，并创作了第一部长篇小说。此后弃医从文，笔耕不辍。1954年，英国女王授予他“荣誉侍从”的称号，他成为皇家文学会的会员。代表作有《月亮与六便士》《刀锋》《人生的枷锁》等长篇小说及多部短篇小说。
            - paragraph [ref=e173]: .
            - paragraph [ref=e174]: 译者：
            - paragraph [ref=e175]: 苏福忠
            - paragraph [ref=e176]: 著名翻译家，译作有《一九八四》《瓦尔登湖》《红字》及厄普代克四部曲《兔子富了》等，著有《译事余墨》，发表其他各类个人作品六十余万字。
