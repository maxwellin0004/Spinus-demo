            - list [ref=e182]:
              - listitem [ref=e183]:
                - figure [ref=e184]:
                  - text: 我们每个人生在世界上都是孤独的。每个人都被囚禁在一座铁塔里，只能靠一些符号同别人传达自己的思想；而这些符号并没有共同的价值，因此它们的意义是模糊的、不确定的。我们非常可怜地想把自己心中的财富传送给别人，但是他们却没有接受这些财富的能力。因此我们只能孤独地行走，尽管身体互相依傍却并不在一起，即不了解别人也不能为别人所了解。 (
                  - link "查看原文" [ref=e185] [cursor=pointer]:
