              - listitem [ref=e192]:
                - figure [ref=e193]:
                  - text: 她对自己的丈夫从来就没有什么感情，过去我认为她爱施特略夫，实际上只是男人的爱抚和生活的安适在女人身上引起的自然反应。大多数女人都把这种反应当做爱情了。这是一种对任何一个人都可能产生的被动的感情，正像藤蔓可以攀附在随便哪株树上一样。因为这种感情可以叫一个女孩子嫁给任何一个需要她的男人，相信日久天长便会对这个人产生爱情，所以世俗的见解便断定了它的力量。但是说到底，这种感情是什么呢？它只不过是对有保障的生活的满足，对拥有家资的骄傲，对有人需要自己沾沾自喜，和对建立起自己的家庭洋洋得意而已；女人们秉性善良、喜爱虚荣，因此便认为这种感情极富于精神价值。但是在冲动的热情前面，这种感情是毫无防卫能力的。 (
