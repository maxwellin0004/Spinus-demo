            - paragraph [ref=e161]: 余华
            - paragraph [ref=e162]: 1960年4月出生，曾经从事过5年的牙医工作，1983年开始写作，主要作品有《活着》《许三观卖血记》《在细雨中呼喊》《兄弟》《第七天》等。作品已被翻译成35种语言，在美国、英国、法国、德国、意大利、西班牙、俄罗斯、日本等37个国家和地区出版。曾获意大利格林扎纳·卡佛文学奖（1998年）,法国文学和艺术骑士勋章（2004年），法国国际信使外国小说奖（2008年），意大利朱塞佩·阿切尔比国际文学奖（2014年）等。
