        - generic [ref=e130]:
          - heading "内容简介 · · · · · ·" [level=2] [ref=e131]
          - generic [ref=e134]:
            - paragraph [ref=e135]: 【内容简介】
            - paragraph [ref=e136]: 《活着》是当代作家余华的代表作，讲述了一个人历尽世间沧桑和磨难的一生，亦将中国大半个世纪的社会变迁凝缩其间。《活着》还讲述了眼泪的宽广和丰富；讲述了绝望的不存在；讲述了人是为了活着本身而活着的，而不是为了活着之外的任何事物而活着。
            - paragraph [ref=e137]: 《活着》出版25年来打动了无数读者，经过时间的沉淀，已成为20世纪中国文学当之无愧的经典之作。到今天，已被译介至英、法、德、意、日、韩、俄等30多个国家和地区，获得国内外多个文学大奖，余华也凭借这部作品于2004年获得法兰西艺术和骑士文化勋章。
            - paragraph [ref=e138]: 25年后重新修订出版，相信《活着》仍然会以超越时间与空间的精神内核，击中我们每个人的心。
